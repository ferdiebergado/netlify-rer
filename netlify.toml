[build]
command = "npm run build"
publish = "dist"

[[headers]]
for = "/*"
[headers.values]
Referrer-Policy = "strict-origin-when-cross-origin"
X-Content-Type-Options = "nosniff"
Content-Security-Policy = "default-src 'none'; script-src 'self'; connect-src 'self'; img-src 'self'; style-src 'unsafe-inline'; base-uri 'self'; form-action 'self'; manifest-src 'self'; frame-ancestors 'none'"

[dev]
command = "vite"

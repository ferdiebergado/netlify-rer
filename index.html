<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Plate Generator v4.0</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />
  </head>
  <body>
    <main
      class="flex h-screen items-center justify-center bg-gray-100 dark:bg-gray-800"
    >
      <article
        class="shadow-md w-lg px-10 py-12 rounded-2xl bg-white dark:bg-gray-900 dark:text-white"
      >
        <h1 class="text-2xl font-semibold mb-10 text-center">
          Random Plate Generator
        </h1>

        <div
          id="error"
          class="px-3 py-5 bg-red-200 text-red-800 rounded-md text-center"
        ></div>

        <div class="flex flex-col items-center my-12 gap-3">
          <h2 class="text-6xl font-bold" id="plate">Plate</h2>
          <h3 class="text-3xl font-semibold" id="driver">Driver</h3>
        </div>

        <div class="flex gap-5 justify-between">
          <select
            class="p-3 border border-gray-300 rounded-md flex-1 dark:bg-gray-800 dark:text-white"
            id="region"
          >
            <option value="A">Region I</option>
            <option value="B">Region II</option>
            <option value="C">Region III</option>
            <option value="D">CALABARZON</option>
            <option value="V">MIMAROPA</option>
            <option value="A">CAR</option>
            <option value="P" selected>NCR</option>
            <option value="E">Region V</option>
            <option value="F">Region VI</option>
            <option value="G">Region VII</option>
            <option value="G">Region NIR</option>
            <option value="H">Region VIII</option>
            <option value="J">Region IX</option>
            <option value="K">Region X</option>
            <option value="L">Region XI</option>
            <option value="M">Region XII</option>
            <option value="L">Caraga</option>
            <option value="J">BARMM</option>
          </select>
          <button
            class="bg-sky-600 text-white py-3 px-5 rounded-md flex-0"
            id="generate"
          >
            GENERATE
          </button>
        </div>
      </article>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

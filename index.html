<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Generate random plate numbers" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />
    <title>Random Plate Generator</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />
  </head>
  <body>
    <main class="flex h-screen items-center justify-center bg-gray-100 dark:bg-gray-800">
      <article
        class="w-lg rounded-2xl bg-white px-10 py-12 shadow-md dark:bg-gray-900 dark:text-white"
      >
        <h1 class="mb-10 text-center text-2xl font-semibold">Random Plate Generator</h1>

        <div id="error" class="rounded-md bg-red-200 px-3 py-5 text-center text-red-800"></div>

        <div class="my-12 flex flex-col items-center gap-3">
          <h2 class="text-6xl font-bold" id="plate">Plate</h2>
          <h3 class="text-3xl font-semibold" id="driver">Driver</h3>
        </div>

        <form class="flex justify-between gap-5">
          <select
            class="flex-1 rounded-md border border-gray-300 p-3 dark:bg-gray-800 dark:text-white"
            id="region"
          >
            <option value="A">Region I</option>
            <option value="B">Region II</option>
            <option value="C">Region III</option>
            <option value="D">CALABARZON</option>
            <option value="V">MIMAROPA</option>
            <option value="A">CAR</option>
            <option value="P" selected>NCR</option>
            <option value="E">Region V</option>
            <option value="F">Region VI</option>
            <option value="G">Region VII</option>
            <option value="G">Region NIR</option>
            <option value="H">Region VIII</option>
            <option value="J">Region IX</option>
            <option value="K">Region X</option>
            <option value="L">Region XI</option>
            <option value="M">Region XII</option>
            <option value="L">Caraga</option>
            <option value="J">BARMM</option>
          </select>
          <button
            type="button"
            class="flex-0 rounded-md bg-sky-600 px-5 py-3 text-white"
            id="generate"
          >
            GENERATE
          </button>
        </form>
      </article>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Generate test data" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />
    <title>Random Plate Generator</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />
  </head>
  <body>
    <main class="flex h-screen items-center justify-center bg-gray-100 dark:bg-gray-800">
      <section
        class="mx-5 w-full rounded-2xl border border-gray-200 bg-white px-8 py-10 shadow-md sm:w-lg sm:px-10 sm:py-12 dark:border-gray-900 dark:bg-gray-900 dark:text-white dark:shadow-lg"
      >
        <div
          id="error"
          class="hidden rounded-md bg-red-200 px-3 py-5 text-center text-red-800"
        ></div>

        <div class="mt-6 mb-16 flex flex-col items-center gap-3 text-center">
          <div id="plate" class="text-5xl font-bold sm:text-6xl"></div>
          <div
            id="driver"
            class="text-2xl font-semibold text-gray-500 sm:text-3xl dark:text-gray-400"
          ></div>
        </div>

        <form class="flex flex-col gap-10">
          <div class="flex items-center gap-5">
            <label class="text-gray-600 dark:text-white" for="region">Region:</label>
            <select
              id="region"
              class="flex-1 rounded-md border border-gray-300 p-3 dark:border-gray-700 dark:bg-gray-800 dark:text-white"
              aria-required="true"
              required
            >
              <option value="A">Region I</option>
              <option value="B">Region II</option>
              <option value="C">Region III</option>
              <option value="D">CALABARZON</option>
              <option value="V">MIMAROPA</option>
              <option value="A">CAR</option>
              <option value="P" selected>NCR</option>
              <option value="E">Region V</option>
              <option value="F">Region VI</option>
              <option value="G">Region VII</option>
              <option value="G">Region NIR</option>
              <option value="H">Region VIII</option>
              <option value="J">Region IX</option>
              <option value="K">Region X</option>
              <option value="L">Region XI</option>
              <option value="M">Region XII</option>
              <option value="L">Caraga</option>
              <option value="J">BARMM</option>
            </select>
          </div>
          <button type="button" id="generate" class="rounded-md bg-sky-700 px-5 py-3 text-white">
            GENERATE
          </button>
        </form>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

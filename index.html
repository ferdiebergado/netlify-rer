<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Generate test data" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />
    <title>Random Plate Generator</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />
  </head>
  <body>
    <main class="flex min-h-dvh items-center justify-center bg-gray-100 dark:bg-gray-800">
      <div
        class="mx-3 w-full max-w-lg rounded-2xl border border-gray-200 bg-white px-5 py-10 shadow-md sm:mx-5 sm:px-10 sm:py-12 dark:border-gray-900 dark:bg-gray-900 dark:text-white dark:shadow-lg"
      >
        <div
          id="error"
          class="hidden rounded-md border border-red-400 bg-red-200 px-3 py-5 text-center text-red-900"
          role="alert"
        >
          Something went wrong.
        </div>

        <div class="m-12 flex flex-col items-center" aria-live="polite">
          <div id="plate" class="font-zendots mb-2 text-center text-4xl font-bold">--- ----</div>
          <div
            id="driver"
            class="font-encode flex min-h-[3em] w-full justify-center text-center text-2xl font-bold text-gray-500 dark:text-gray-400"
          >
            Click GENERATE to start.
          </div>
        </div>

        <form class="space-y-7">
          <fieldset class="flex items-center gap-5">
            <label class="text-sm text-gray-700 dark:text-gray-300" for="region">Region</label>
            <select id="region" class="select select-lg flex-1">
              <option value="A">Region I</option>
              <option value="B">Region II</option>
              <option value="C">Region III</option>
              <option value="D">CALABARZON</option>
              <option value="V">MIMAROPA</option>
              <option value="A">CAR</option>
              <option value="P" selected>NCR</option>
              <option value="E">Region V</option>
              <option value="F">Region VI</option>
              <option value="G">Region VII</option>
              <option value="G">NIR</option>
              <option value="H">Region VIII</option>
              <option value="J">Region IX</option>
              <option value="K">Region X</option>
              <option value="L">Region XI</option>
              <option value="M">Region XII</option>
              <option value="L">Caraga</option>
              <option value="J">BARMM</option>
            </select>
          </fieldset>
          <button
            type="submit"
            id="generate"
            class="w-full rounded-lg bg-sky-700 px-6 py-4 font-bold text-white transition-all hover:bg-sky-600 focus:ring-4 focus:ring-sky-300 active:scale-[0.98]"
          >
            GENERATE
          </button>
        </form>
        <p class="mt-6 text-center text-xs text-gray-500 dark:text-gray-400">
          <span class="font-bold">DISCLAIMER:</span> This app generates synthetic test data only.
          Any resemblance to real persons or vehicles is purely coincidental. Use of this data for
          official or commercial purposes is strictly at your own risk.
        </p>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
